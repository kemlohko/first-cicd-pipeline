name: Deploy to EC2

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Deploying version: $TAG"
          echo "$TAG" > app/version.txt